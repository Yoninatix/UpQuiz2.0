server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Use Docker's internal DNS so nginx re-resolves service IPs automatically
    # when containers are recreated (no more manual nginx restarts needed).
    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_buffering    on;
    proxy_buffer_size  16k;
    proxy_buffers      4 32k;

    # ── Go Backend REST API ──────────────────────────────────────────────────
    location /api/ {
        set $backend "http://backend:8080";
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    3600s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    3600s;
    }

    # ── AI / RAG Service ────────────────────────────────────────────────────
    location /ai/ {
        set $aiservice "http://ai-service:3001";
        rewrite            ^/ai/(.*) /$1 break;
        proxy_pass         $aiservice;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    3600s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    3600s;
    }

    # ── React SPA (catch-all) ────────────────────────────────────────────────
    location / {
        set $frontend "http://frontend:80";
        proxy_pass         $frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
    }

    # ── Proxy health probe ───────────────────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
