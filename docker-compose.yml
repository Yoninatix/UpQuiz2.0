services:

  # ─── PostgreSQL (Debian Bookworm official image) ─────────────────────────────
  postgres:
    image: postgres:16
    container_name: examdb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-examdb}
      POSTGRES_USER: ${POSTGRES_USER:-examuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exampassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-examuser} -d ${POSTGRES_DB:-examdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - examnet

  # ─── Milvus: etcd ────────────────────────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    networks:
      - examnet

  # ─── Milvus: MinIO ───────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    container_name: milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - examnet

  # ─── Milvus Standalone ───────────────────────────────────────────────────────
  milvus-standalone:
    image: milvusdb/milvus:v2.4.4
    container_name: milvus-standalone
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
    networks:
      - examnet

  # ─── Ollama (Gemma runtime) ──────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # ── NVIDIA GPU: uncomment the block below and ensure nvidia-docker is installed
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - examnet

  # ─── One-shot: pull Gemma model into Ollama ──────────────────────────────────
  ollama-setup:
    image: alpine:3.20
    container_name: ollama-setup
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache curl -q
        echo "Waiting for Ollama to be ready..."
        until curl -sf http://ollama:11434/ >/dev/null 2>&1; do
          sleep 3
        done
        echo "Pulling model: $$OLLAMA_MODEL"
        curl -X POST http://ollama:11434/api/pull \
          -H "Content-Type: application/json" \
          -d "{\"name\":\"$$OLLAMA_MODEL\",\"stream\":false}"
        echo ""
        echo "Pulling embedding model: nomic-embed-text"
        curl -X POST http://ollama:11434/api/pull \
          -H "Content-Type: application/json" \
          -d "{\"name\":\"nomic-embed-text\",\"stream\":false}"
        echo ""
        echo "Model pull complete."
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
    depends_on:
      - ollama
    networks:
      - examnet

  # ─── Go Backend API (Debian Trixie runtime) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exam-backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-examdb}
      POSTGRES_USER: ${POSTGRES_USER:-examuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exampassword}
      JWT_SECRET: ${JWT_SECRET:-changeme_secret_replace_in_prod}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      AI_SERVICE_URL: http://ai-service:3001
      PORT: 8080
      ENV: ${GO_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - examnet
    volumes:
      - uploads_data:/app/uploads

  # ─── TypeScript AI Service — RAG + Embeddings (Debian Trixie runtime) ────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: exam-ai-service
    restart: unless-stopped
    environment:
      PORT: 3001
      MILVUS_HOST: milvus-standalone
      MILVUS_PORT: 19530
      MILVUS_COLLECTION: ${MILVUS_COLLECTION:-document_chunks}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-examdb}
      POSTGRES_USER: ${POSTGRES_USER:-examuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exampassword}
    depends_on:
      milvus-standalone:
        condition: service_healthy
      ollama:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - examnet
    volumes:
      - uploads_data:/app/uploads

  # ─── React Frontend (nginx:alpine serving static build) ──────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_AI_SERVICE_URL: ${VITE_AI_SERVICE_URL:-/ai}
    container_name: exam-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - examnet

  # ─── Nginx Reverse Proxy (Debian Trixie) ─────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: exam-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - backend
      - ai-service
      - frontend
    networks:
      - examnet
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

# ─── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  etcd_data:
  minio_data:
  milvus_data:
  ollama_data:
  uploads_data:

# ─── Network ──────────────────────────────────────────────────────────────────
networks:
  examnet:
    driver: bridge
